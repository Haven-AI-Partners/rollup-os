name: Weekly Performance Review

on:
  schedule:
    - cron: "0 6 * * 5" # Every Friday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run performance analysis
        id: analyze
        run: node scripts/analysis/performance.mjs

      - name: Get current date
        if: steps.analyze.outputs.has_findings == 'true'
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create PR if findings exist
        if: steps.analyze.outputs.has_findings == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sign-commits: true
          branch: analysis/performance-${{ steps.date.outputs.date }}
          add-paths: docs/analysis/
          commit-message: |
            analysis: weekly performance review ${{ steps.date.outputs.date }}

            Found ${{ steps.analyze.outputs.total_findings }} finding(s).
            Auto-generated by weekly performance review workflow.
          title: "Weekly Performance Review — ${{ steps.date.outputs.date }}"
          body-path: docs/analysis/performance-${{ steps.date.outputs.date }}.md
          labels: analysis,performance
          base: main
