name: Weekly Security Review

on:
  schedule:
    - cron: "0 6 * * 3" # Every Wednesday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run security analysis
        id: analyze
        run: node scripts/analysis/security.mjs

      - name: Create PR if findings exist
        if: steps.analyze.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="analysis/security-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add docs/analysis/
          git commit -m "analysis: weekly security review ${DATE}

          Found ${{ steps.analyze.outputs.total_findings }} finding(s).
          Auto-generated by weekly security review workflow."

          git push -u origin "$BRANCH"

          gh pr create \
            --title "Weekly Security Review — ${DATE}" \
            --body-file "docs/analysis/security-${DATE}.md" \
            --label "analysis,security" \
            --base main
